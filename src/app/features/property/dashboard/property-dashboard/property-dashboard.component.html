<div class="dashboard-container">

    <!-- Mobile Top Bar -->
    <div class="mobile-topbar">
        <button class="menu-btn" (click)="toggleSidebar()">
            ☰
        </button>
        <h3 *ngIf="property">{{ property.name }}</h3>
    </div>

    <!-- Overlay -->
    <div class="sidebar-overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()">
    </div>

    <!-- Sidebar -->
    <app-sidebar [property]="property" [isOpen]="isSidebarOpen" (tabSelected)="onTabSelected($event)">
    </app-sidebar>

    <!-- Main Content Area -->
    <div class="dashboard-content">

        <app-overview *ngIf="selectedTab === 'overview'" [property]="property">
        </app-overview>

        <!-- <app-units *ngIf="selectedTab === 'units'"></app-units>
    <app-tenants *ngIf="selectedTab === 'tenants'"></app-tenants>
    <app-payments *ngIf="selectedTab === 'payments'"></app-payments> -->

    </div>

</div>
