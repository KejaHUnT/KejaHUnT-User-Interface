<div class="tenant-form-wrap">

  <!-- Unit Context Banner -->
  <div *ngIf="selectedUnit" class="unit-banner">
    <div class="unit-banner-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="unit-banner-text">
      <span class="unit-banner-label">Assigning to</span>
      <span class="unit-banner-value">Unit {{ selectedUnit.doorNumber }} · Floor {{ selectedUnit.floor }} · Ksh {{ selectedUnit.price | number }}</span>
    </div>
  </div>

  <form [formGroup]="form" class="tenant-grid" autocomplete="off">

    <div class="field-group">
      <label class="field-label">Full Name <span class="req">*</span></label>
      <div class="input-shell" [class.input-error]="form.get('fullName')?.invalid && form.get('fullName')?.touched">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input formControlName="fullName" placeholder="e.g. Jane Mwangi" />
      </div>
      <span class="field-error" *ngIf="form.get('fullName')?.invalid && form.get('fullName')?.touched">Full name is required</span>
    </div>

    <div class="field-group">
      <label class="field-label">Phone Number <span class="req">*</span></label>
      <div class="input-shell" [class.input-error]="form.get('phoneNumber')?.invalid && form.get('phoneNumber')?.touched">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.59 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.92a16 16 0 0 0 6.59 6.59l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input formControlName="phoneNumber" placeholder="e.g. 0712345678" />
      </div>
      <span class="field-error" *ngIf="form.get('phoneNumber')?.invalid && form.get('phoneNumber')?.touched">Phone number is required</span>
    </div>

    <div class="field-group">
      <label class="field-label">ID Number <span class="req">*</span></label>
      <div class="input-shell" [class.input-error]="form.get('idNo')?.invalid && form.get('idNo')?.touched">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <input type="number" formControlName="idNo" placeholder="National ID" />
      </div>
      <span class="field-error" *ngIf="form.get('idNo')?.invalid && form.get('idNo')?.touched">ID number is required</span>
    </div>

    <div class="field-group">
      <label class="field-label">Email Address</label>
      <div class="input-shell input-shell--readonly">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input formControlName="email" type="email" readonly />
        <span class="lock-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
      </div>
    </div>

    <div class="field-group field-group--full">
      <label class="field-label">Employer / Company <span class="req">*</span></label>
      <div class="input-shell" [class.input-error]="form.get('employer')?.invalid && form.get('employer')?.touched">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <input formControlName="employer" placeholder="e.g. Safaricom PLC" />
      </div>
      <span class="field-error" *ngIf="form.get('employer')?.invalid && form.get('employer')?.touched">Employer is required</span>
    </div>

  </form>
</div>
