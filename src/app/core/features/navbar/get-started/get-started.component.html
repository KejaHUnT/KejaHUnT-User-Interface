<div class="kh-home-shell">

  <!-- Background glow -->
  <div class="kh-home-glow"></div>

  <div class="kh-home-inner">

    <!-- Badge -->
    <div class="kh-home-badge">
      <span class="kh-home-dot"></span>
      Kenya's Premier Property Platform
    </div>

    <!-- Title -->
    <h1 class="kh-home-title">
      Welcome to<br>
      <em class="kh-home-em">KejaHUnT</em>
    </h1>

    <p class="kh-home-sub">
      Start by choosing what you'd like to do today.
    </p>

    <!-- CTA Actions -->
    <div class="kh-home-actions">

      <button class="kh-home-btn kh-home-btn--gold" (click)="createProperty()">
        <div class="kh-home-btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="kh-home-btn-text">
          <span class="kh-home-btn-label">Create Property</span>
          <span class="kh-home-btn-desc">List a new property</span>
        </div>
        <span class="kh-home-btn-shine"></span>
      </button>

      <button class="kh-home-btn kh-home-btn--outline" (click)="listProperties()">
        <div class="kh-home-btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </div>
        <div class="kh-home-btn-text">
          <span class="kh-home-btn-label">Manage Properties</span>
          <span class="kh-home-btn-desc">View &amp; edit listings</span>
        </div>
      </button>

      <button class="kh-home-btn kh-home-btn--ghost" routerLink="/">
        <div class="kh-home-btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <div class="kh-home-btn-text">
          <span class="kh-home-btn-label">Find Homes</span>
          <span class="kh-home-btn-desc">Browse listings</span>
        </div>
      </button>

    </div>

  </div>

</div>
