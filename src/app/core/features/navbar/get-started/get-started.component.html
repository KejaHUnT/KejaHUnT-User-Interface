<div class="container py-5 text-center">

    <h2 class="mb-3">Welcome to kejaHUnT</h2>

    <p class="text-muted mb-5">
        Start by choosing what you'd like to do.
    </p>

    <div class="d-flex justify-content-center gap-4 flex-wrap">

        <!-- Create Property -->
        <button class="btn btn-warning px-4 py-3 fw-bold" (click)="createProperty()">

            <i class="fas fa-building me-2"></i>
            Create Property
        </button>

        <!-- Manage Properties -->
        <button class="btn btn-outline-primary px-4 py-3 fw-bold" (click)="listProperties()">

            <i class="fas fa-list me-2"></i>
            Manage Properties
        </button>

        <button class="btn btn-outline-secondary px-4 py-3 fw-bold" routerLink="/">

            <i class="fas fa-search me-2"></i>
            Find Homes
        </button>

    </div>

</div>
