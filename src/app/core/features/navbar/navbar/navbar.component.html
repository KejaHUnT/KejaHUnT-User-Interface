<nav class="kh-nav" [class.kh-nav--scrolled]="isScrolled">

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>

      <button class="kh-toggle" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen" aria-label="Toggle menu">

        <span class="kh-toggle-bar" [class.open]="isMobileMenuOpen"></span>
        <span class="kh-toggle-bar" [class.open]="isMobileMenuOpen"></span>

      <button class="kh-mobile-btn" (click)="goToAccount(); closeMobileMenu()">

          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
