server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # No caching for index.html to prevent future deployment issues
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Special handling for env-v2.js - no caching
    location /assets/env-v2.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ~* ^/env.*\.js$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
    try_files $uri =404;
    }  

    location = /sitemap.xml {
    proxy_pass http://gateway:8080/properties/sitemap.xml;
    proxy_set_header Host $host;
    }

    location = /robots.txt {
    proxy_pass http://gateway:8080/properties/robots.txt;
    proxy_set_header Host $host;
    }

    # Cache static assets (improves performance) - excludes env-v2.js and index.html
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}